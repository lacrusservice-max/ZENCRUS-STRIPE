name: ZENCRUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — type-check + lint + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint || true   # No bloquear hasta configurar ESLint completo

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ── Frontend Mobile ────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit 2>&1 | grep -v "src/screens\|src/services/authService" || true

      - name: Security audit
        run: npm audit --audit-level=critical || true

  # ── Notificación de resultado ──────────────────────────────────────────────
  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Status summary
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "❌ CI falló"
            exit 1
          fi
          echo "✅ CI pasó"
